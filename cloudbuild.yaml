steps:
  # 1. Instalar dependencias
  - name: node:20-slim
    entrypoint: npm
    args: [ci]

  # 2. Build (env vars vienen de Secret Manager)
  - name: node:20-slim
    entrypoint: npm
    args: [run, build]
    secretEnv:
      - VITE_GOOGLE_CLIENT_ID
      - VITE_GOOGLE_API_KEY
      - VITE_GOOGLE_CALENDAR_ID
      - VITE_FIREBASE_API_KEY
      - VITE_FIREBASE_AUTH_DOMAIN
      - VITE_FIREBASE_PROJECT_ID
      - VITE_FIREBASE_STORAGE_BUCKET
      - VITE_FIREBASE_MESSAGING_SENDER_ID
      - VITE_FIREBASE_APP_ID

  # 3. Deploy hosting + reglas Firestore (autenticado via ADC de Cloud Build)
  - name: node:20-slim
    entrypoint: bash
    args:
      - -c
      - |
        npm install -g firebase-tools
        firebase deploy \
          --only hosting,firestore:rules \
          --project fonoaudiologa-valentina-5a014 \
          --non-interactive

availableSecrets:
  secretManager:
    - versionName: projects/899578047580/secrets/VITE_GOOGLE_CLIENT_ID/versions/latest
      env: VITE_GOOGLE_CLIENT_ID
    - versionName: projects/899578047580/secrets/VITE_GOOGLE_API_KEY/versions/latest
      env: VITE_GOOGLE_API_KEY
    - versionName: projects/899578047580/secrets/VITE_GOOGLE_CALENDAR_ID/versions/latest
      env: VITE_GOOGLE_CALENDAR_ID
    - versionName: projects/899578047580/secrets/VITE_FIREBASE_API_KEY/versions/latest
      env: VITE_FIREBASE_API_KEY
    - versionName: projects/899578047580/secrets/VITE_FIREBASE_AUTH_DOMAIN/versions/latest
      env: VITE_FIREBASE_AUTH_DOMAIN
    - versionName: projects/899578047580/secrets/VITE_FIREBASE_PROJECT_ID/versions/latest
      env: VITE_FIREBASE_PROJECT_ID
    - versionName: projects/899578047580/secrets/VITE_FIREBASE_STORAGE_BUCKET/versions/latest
      env: VITE_FIREBASE_STORAGE_BUCKET
    - versionName: projects/899578047580/secrets/VITE_FIREBASE_MESSAGING_SENDER_ID/versions/latest
      env: VITE_FIREBASE_MESSAGING_SENDER_ID
    - versionName: projects/899578047580/secrets/VITE_FIREBASE_APP_ID/versions/latest
      env: VITE_FIREBASE_APP_ID

options:
  logging: CLOUD_LOGGING_ONLY
